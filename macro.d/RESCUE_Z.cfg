[gcode_macro RESCUE_Z]
description: Move bed 10mm up whout Z homing
gcode:
    M117 Set virtual Z=200
    SET_KINEMATIC_POSITION Z=200

    M117 Enable relative mode
    G91
    
    M117 Move bed
    G1 Z-10 F600
    
    M117 Restore absolute mode
    G90

    M117 Done. Please run G28
