[include shell_command.cfg]
# See docs/Config_Reference.md for a description of parameters.
## https://canbus.esoterical.online/Final_Steps.html#update-config
[mcu]
canbus_uuid: 8c327d6745f1

[printer]
kinematics: corexy
max_velocity: 500                # 
max_accel: 5500                  # safe for Y axis
max_z_velocity: 20               #
max_z_accel: 300                 #
square_corner_velocity: 5.0      #

[force_move]
enable_force_move: True

[temperature_sensor MCU_M8P]
sensor_type: temperature_mcu

[temperature_sensor CM4]
sensor_type: temperature_host

#####################################################################
# 	X/Y Stepper Settings for tmc5160
#####################################################################
[stepper_x]
dir_pin: PB4
step_pin: PE2
enable_pin: !PC11
microsteps: 64
rotation_distance: 40
full_steps_per_rotation: 200
endstop_pin: toolhead:endstop_x
position_min: -0.1
position_endstop: 301
position_max: 301
homing_speed: 20
second_homing_speed: 5
homing_retract_dist: 5
homing_positive_dir: true

[tmc5160 stepper_x]
cs_pin: PC10
spi_software_sclk_pin: PA5
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
#run_current: 1.2        # moons-ms17hd6p420I-05
run_current: 1.7      #ldo-42sth48-2804ah
sense_resistor: 0.075
interpolate: true

[stepper_y]
step_pin: PF12
dir_pin: PF11
enable_pin: !PB3
microsteps: 64
rotation_distance: 40
full_steps_per_rotation: 200
endstop_pin: ^PF4
position_min: -0.1
position_endstop: 305
position_max: 305
homing_speed: 20
second_homing_speed: 5
homing_retract_dist: 5
homing_positive_dir: true

[tmc5160 stepper_y]
cs_pin: PF13
spi_software_sclk_pin: PA5
spi_software_mosi_pin: PA7
spi_software_miso_pin: PA6
#run_current: 1.2        # moons-ms17hd6p420I-05
run_current: 1.7      #ldo-42sth48-2804ah
sense_resistor: 0.075
interpolate: true

